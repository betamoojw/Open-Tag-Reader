<!DOCTYPE html>
   <html lang="en">

   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Veterinary Chemical Inventory</title>
       <link rel="stylesheet" href="style.css">
   </head>

   <body>
       <div class="container">
           <h1>Veterinary Chemical Inventory</h1>

           <div class="options">
               <div class="radio-group">
                   <input type="radio" id="showAll" name="statusFilter" value="all" checked
                       onchange="showAllChemicals()">
                   <label for="showAll">All</label>
               </div>

               <div class="radio-group">
                   <input type="radio" id="showActive" name="statusFilter" value="active"
                       onchange="showActiveChemicals()">
                   <label for="showActive">Active</label>
               </div>

               <div class="radio-group">
                   <input type="radio" id="showInactive" name="statusFilter" value="inactive"
                       onchange="showInactiveChemicals()">
                   <label for="showInactive">Inactive</label>
               </div>

               <button onclick="openAddChemicalForm()">Add New</button>
           </div>

           <div id="inventory-table">
               <table>
                   <thead>
                       <tr>
                           <th>Date</th>
                           <th>Product Name</th>
                           <th>Qty</th>
                           <th>Expiry / DOM</th>
                           <th>WHP (days)</th>
                           <th>Batch</th>
                           <th>By</th>
                           <th>Status</th>
                           <th>Actions</th>
                       </tr>
                   </thead>
                   <tbody>
                       </tbody>
               </table>
           </div>

           <div id="add-chemical-form" style="display:none;">
               <h2>Add/Edit Chemical</h2>
               <form id="chemical-form">
                   <div class="form-field">
                       <label for="dateReceived">Date Received:</label>
                       <input type="date" id="dateReceived" name="dateReceived" required>
                   </div>

                   <div class="form-field">
                       <label for="productName">Product Name:</label>
                       <input type="text" id="productName" name="productName" required>
                   </div>

                   <div class="form-field">
                       <label for="quantity">Quantity:</label>
                       <input type="number" id="quantity" name="quantity" required>
                       <select id="quantityUnit" name="quantityUnit">
                           <option value="mL">mL</option>
                           <option value="L">L</option>
                           <option value="g">g</option>
                           <option value="kg">kg</option>
                           <option value="unit">Unit</option>
                       </select>
                   </div>

                   <div class="form-field date-field">
                       <label for="expiryDate">Expiry / DOM:</label>
                       <input type="date" id="expiryDate" name="expiryDate">
                       <div class="radio-group-inline">
                           <input type="radio" id="isExpiry" name="dateType" value="expiry" checked>
                           <label for="isExpiry" class="radio-label">Expiry</label>
                           <input type="radio" id="isDOM" name="dateType" value="dom">
                           <label for="isDOM" class="radio-label">DOM</label>
                       </div>
                   </div>

                   <div class="form-field">
                       <label for="whp">WHP (days):</label>
                       <input type="number" id="whp" name="whp">
                   </div>

                   <div class="form-field">
                       <label for="batchNumber">Batch #:</label>
                       <input type="text" id="batchNumber" name="batchNumber">
                   </div>

                   <div class="form-field">
                       <label for="updatedBy">Updated By:</label>
                       <input type="text" id="updatedBy" name="updatedBy" required>
                   </div>

                   <input type="hidden" id="chemicalId" name="chemicalId">

                   <div class="form-actions">
                       <button type="submit">Save</button>
                       <button type="button" onclick="closeAddChemicalForm()">Cancel</button>
                   </div>
               </form>
           </div>
       </div>

       <script src="script.js"></script>
   </body>

   </html>
